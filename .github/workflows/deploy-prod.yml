name: Deploy production (VPS)

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/deploy-prod.sh"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:

concurrency:
  group: production-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Docker prod na VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy via SSH (tentativa 1)
        id: deploy_try_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            bash scripts/deploy-prod.sh

      - name: Aguardar antes da tentativa 2
        if: steps.deploy_try_1.outcome == 'failure'
        run: sleep 20

      - name: Deploy via SSH (tentativa 2)
        id: deploy_try_2
        if: steps.deploy_try_1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            bash scripts/deploy-prod.sh

      - name: Aguardar antes da tentativa 3
        if: steps.deploy_try_1.outcome == 'failure' && steps.deploy_try_2.outcome == 'failure'
        run: sleep 20

      - name: Deploy via SSH (tentativa 3)
        id: deploy_try_3
        if: steps.deploy_try_1.outcome == 'failure' && steps.deploy_try_2.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            bash scripts/deploy-prod.sh

      - name: Falhar se todas tentativas falharem
        if: steps.deploy_try_1.outcome == 'failure' && steps.deploy_try_2.outcome == 'failure' && steps.deploy_try_3.outcome == 'failure'
        run: |
          echo "Falha ao conectar na VPS após 3 tentativas."
          exit 1
