services:
  postgres:
    image: postgres:16-alpine
    container_name: cais_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cais}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-cais_indicacoes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cais_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cais} -d ${POSTGRES_DB:-cais_indicacoes}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: cais_api_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-cais}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cais_indicacoes}}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      TV_API_TOKEN: ${TV_API_TOKEN:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      cais_internal: {}
      proxy:
        aliases:
          - cais-api
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cais_pgadmin_prod
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?defina PGADMIN_DEFAULT_EMAIL no .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?defina PGADMIN_DEFAULT_PASSWORD no .env}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      # Subdomínio dedicado (ex.: https://db.seudominio.com.br) via Nginx Proxy Manager
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: "1"
      # Não use PGADMIN_CONFIG_PREFERRED_URL_SCHEME aqui: valores string precisam de aspas
      # Python ('https') e sem isso o container entra em crash loop (NameError: https).
      # O NPM envia X-Forwarded-Proto; PROXY_X_* acima já cobre HTTPS no subdomínio.
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.prod.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      cais_internal: {}
      proxy:
        aliases:
          - cais-db

networks:
  cais_internal:
    driver: bridge
  proxy:
    external: true
    name: ${PROXY_NETWORK:?defina PROXY_NETWORK no .env — rede do global-proxy}

volumes:
  postgres_data:
  pgadmin_data:
